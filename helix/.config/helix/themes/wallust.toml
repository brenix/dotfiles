attributes = "#686868"
constant = "#747474"
"constant.character.escape" = "#747474"
"constant.numeric" = "#747474"
constructor = "#8E8E8E"
debug = "#B9B9B9"
"diff.delta" = "#A0A0A0"
"diff.minus" = "#7C7C7C"
"diff.plus" = "#8E8E8E"
error = "#7C7C7C"
function = "#8E8E8E"
hint = "#747474"
info = "#686868"
keyword = "#7C7C7C"
label = "#747474"
"markup.heading" = "#A0A0A0"
"markup.link.text" = "#7C7C7C"
"markup.list" = "#B9B9B9"
"markup.quote" = "#525252" 
"markup.raw" = "#A0A0A0" 
namespace = "#686868"
operator = "#7C7C7C"
special = "#A0A0A0" 
string = "#A0A0A0"
type = "#686868"
"ui.text" = "#B9B9B9"
"ui.text.focus" = "#B9B9B9"
variable = "#B9B9B9"
"variable.other.member" = "#7C7C7C"
warning = "#A0A0A0" 

# Modifiers for syntax elements
[comment]
fg = "#525252"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#A0A0A0"
modifiers = ["bold"]

["markup.italic"]
fg = "#747474"
modifiers = ["italic"]

["markup.link.url"]
fg = "#8E8E8E"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#B9B9B9"
bg = "#101010"

["ui.bufferline"]
bg = "#101010"
fg = "#525252"

["ui.bufferline.active"]
bg = "#101010"
fg = "#A0A0A0"
modifiers = ["bold"]

["ui.bufferline.modified"]
bg = "#101010"
fg = "#A0A0A0"

["ui.cursor"]
fg = "#B9B9B9"
modifiers = ["reversed"]

["ui.cursor.insert"]
fg = "#B9B9B9"
modifiers = ["underlined"]

["ui.cursor.match"]
fg = "#A0A0A0"
modifiers = ["underlined"]

["ui.cursor.select"]
