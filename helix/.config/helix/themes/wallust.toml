constructor = "#66800B"
debug = "#100F0F"
"diff.delta" = "#AD8301"
"diff.minus" = "#AF3029"
"diff.plus" = "#879A39"
error = "#AF3029"
function = "#879A39"
hint = "#A02F6F"
info = "#205EA6"
keyword = "#AF3029"
label = "#A02F6F"
"markup.heading" = "#AD8301"
"markup.link.text" = "#AF3029"
"markup.list" = "#100F0F"
"markup.quote" = "#1C1B1A" 
