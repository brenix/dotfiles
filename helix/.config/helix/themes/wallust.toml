attributes = "#7FA5BD"
constant = "#C79EC4"
"constant.character.escape" = "#C79EC4"
"constant.numeric" = "#C79EC4"
constructor = "#90A57D"
debug = "#D0D0D0"
"diff.delta" = "#D7AF87"
"diff.minus" = "#A36666"
"diff.plus" = "#AFBEA2"
error = "#A36666"
function = "#AFBEA2"
hint = "#C79EC4"
info = "#7FA5BD"
keyword = "#A36666"
label = "#C79EC4"
"markup.heading" = "#D7AF87"
"markup.link.text" = "#A36666"
"markup.list" = "#D0D0D0"
"markup.quote" = "#4A4845" 
"markup.raw" = "#E4C9AF" 
namespace = "#7FA5BD"
operator = "#A36666"
special = "#E4C9AF" 
string = "#D7AF87"
type = "#7FA5BD"
"ui.text" = "#D0D0D0"
"ui.text.focus" = "#D0D0D0"
variable = "#D0D0D0"
"variable.other.member" = "#A36666"
warning = "#E4C9AF" 

# Modifiers for syntax elements
[comment]
fg = "#4A4845"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#D7AF87"
modifiers = ["bold"]

["markup.italic"]
fg = "#C79EC4"
modifiers = ["italic"]

["markup.link.url"]
fg = "#AFBEA2"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#D0D0D0"
bg = "#1C1C1C"

["ui.bufferline"]
bg = "#1C1C1C"
fg = "#4A4845"

["ui.bufferline.active"]
bg = "#1C1C1C"
fg = "#D7AF87"
modifiers = ["bold"]

["ui.bufferline.modified"]
bg = "#1C1C1C"
fg = "#D7AF87"

["ui.cursor"]
fg = "#D0D0D0"
modifiers = ["reversed"]

["ui.cursor.insert"]
fg = "#D0D0D0"
modifiers = ["underlined"]

["ui.cursor.match"]
fg = "#D7AF87"
modifiers = ["underlined"]

["ui.cursor.select"]
fg = "#D7AF87"
modifiers = ["underlined"]

["ui.cursorline.primary"]
bg = "#2F2E2D"
fg = "#D0D0D0"

["ui.gutter"]
bg = "#1C1C1C"

["ui.help"]
bg = "#2F2E2D" 
fg = "#D0D0D0" 

["ui.linenr"]
bg = "#1C1C1C"
fg = "#4A4845" 

["ui.linenr.selected"]
bg = "#2F2E2D"
fg = "#D0D0D0" 
modifiers = ["bold"]

["ui.menu"]
bg = "#2F2E2D" 
fg = "#D0D0D0"

["ui.menu.scroll"]
bg = "#2F2E2D"
fg = "#4A4845"

["ui.menu.selected"]
bg = "#4A4845" 
fg = "#D0D0D0"

["ui.popup"]
bg = "#2F2E2D"

["ui.selection"]
bg = "#4A4845" 

["ui.selection.primary"]
bg = "#4A4845" 

["ui.statusline"]
bg = "#2F2E2D" 
fg = "#4A4845" 

["ui.statusline.inactive"]
