"ui.text.focus" = "#C5C9C5"
variable = "#C5C9C5"
"variable.other.member" = "#C4746E"
warning = "#E6C384" 

# Modifiers for syntax elements
[comment]
fg = "#A6A69C"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#C4B28A"
modifiers = ["bold"]

["markup.italic"]
fg = "#A292A3"
modifiers = ["italic"]

["markup.link.url"]
fg = "#87A987"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#C5C9C5"
bg = "#181616"

