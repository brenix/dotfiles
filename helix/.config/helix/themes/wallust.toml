# Modifiers for syntax elements
[comment]
fg = "#303035"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#80BCB6"
modifiers = ["bold"]

["markup.italic"]
fg = "#AB98B5"
modifiers = ["italic"]

["markup.link.url"]
fg = "#6FB593"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
