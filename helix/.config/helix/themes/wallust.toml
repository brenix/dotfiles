attributes = "#3D3D3D"
constant = "#4A4A4A"
"constant.character.escape" = "#4A4A4A"
"constant.numeric" = "#4A4A4A"
constructor = "#4A4A4A"
debug = "#242424"
"diff.delta" = "#666666"
"diff.minus" = "#5C5C5C"
"diff.plus" = "#4A4A4A"
error = "#5C5C5C"
function = "#4A4A4A"
hint = "#4A4A4A"
info = "#3D3D3D"
keyword = "#5C5C5C"
label = "#4A4A4A"
"markup.heading" = "#666666"
"markup.link.text" = "#5C5C5C"
"markup.list" = "#242424"
"markup.quote" = "#8A8A8A" 
"markup.raw" = "#666666" 
namespace = "#3D3D3D"
operator = "#5C5C5C"
special = "#666666" 
string = "#666666"
type = "#3D3D3D"
"ui.text" = "#242424"
"ui.text.focus" = "#242424"
variable = "#242424"
"variable.other.member" = "#5C5C5C"
warning = "#666666" 

# Modifiers for syntax elements
[comment]
fg = "#8A8A8A"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#666666"
modifiers = ["bold"]

["markup.italic"]
fg = "#4A4A4A"
modifiers = ["italic"]

["markup.link.url"]
fg = "#4A4A4A"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#242424"
bg = "#F6F5F4"

["ui.bufferline"]
bg = "#F6F5F4"
fg = "#8A8A8A"

["ui.bufferline.active"]
bg = "#F6F5F4"
fg = "#666666"
modifiers = ["bold"]

["ui.bufferline.modified"]
bg = "#F6F5F4"
fg = "#666666"

["ui.cursor"]
fg = "#242424"
modifiers = ["reversed"]

["ui.cursor.insert"]
fg = "#242424"
modifiers = ["underlined"]

["ui.cursor.match"]
fg = "#666666"
modifiers = ["underlined"]

["ui.cursor.select"]
fg = "#666666"
modifiers = ["underlined"]

["ui.cursorline.primary"]
bg = "#F6F5F4"
fg = "#242424"

["ui.gutter"]
bg = "#F6F5F4"

["ui.help"]
bg = "#F6F5F4" 
fg = "#242424" 

["ui.linenr"]
bg = "#F6F5F4"
fg = "#8A8A8A" 

["ui.linenr.selected"]
bg = "#F6F5F4"
fg = "#242424" 
modifiers = ["bold"]

["ui.menu"]
bg = "#F6F5F4" 
fg = "#242424"

["ui.menu.scroll"]
bg = "#F6F5F4"
fg = "#8A8A8A"

["ui.menu.selected"]
bg = "#8A8A8A" 
fg = "#242424"

["ui.popup"]
bg = "#F6F5F4"

["ui.selection"]
bg = "#8A8A8A" 

["ui.selection.primary"]
bg = "#8A8A8A" 

["ui.statusline"]
bg = "#F6F5F4" 
