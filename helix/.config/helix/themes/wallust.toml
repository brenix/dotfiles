attributes = "#7AA2F7"
constant = "#BB9AF7"
"constant.character.escape" = "#BB9AF7"
"constant.numeric" = "#BB9AF7"
constructor = "#9ECE6A"
debug = "#C0CAF5"
"diff.delta" = "#E0AF68"
"diff.minus" = "#F7768E"
"diff.plus" = "#9ECE6A"
error = "#F7768E"
function = "#9ECE6A"
hint = "#BB9AF7"
info = "#7AA2F7"
keyword = "#F7768E"
label = "#BB9AF7"
"markup.heading" = "#E0AF68"
"markup.link.text" = "#F7768E"
"markup.list" = "#C0CAF5"
"markup.quote" = "#414868" 
"markup.raw" = "#E0AF68" 
namespace = "#7AA2F7"
operator = "#F7768E"
special = "#E0AF68" 
string = "#E0AF68"
type = "#7AA2F7"
"ui.text" = "#C0CAF5"
"ui.text.focus" = "#C0CAF5"
variable = "#C0CAF5"
"variable.other.member" = "#F7768E"
warning = "#E0AF68" 

# Modifiers for syntax elements
[comment]
fg = "#414868"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#E0AF68"
modifiers = ["bold"]

["markup.italic"]
fg = "#BB9AF7"
modifiers = ["italic"]

["markup.link.url"]
fg = "#9ECE6A"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#C0CAF5"
bg = "#1A1B26"

["ui.bufferline"]
bg = "#1A1B26"
