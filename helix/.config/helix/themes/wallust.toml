attributes = "#C3BF97"
constant = "#BCA3A3"
"constant.character.escape" = "#BCA3A3"
"constant.numeric" = "#BCA3A3"
constructor = "#EFEF87"
debug = "#DCDCCC"
"diff.delta" = "#FFD7A7"
"diff.minus" = "#CC9393"
"diff.plus" = "#FFFF87"
error = "#CC9393"
function = "#FFFF87"
hint = "#BCA3A3"
info = "#C3BF97"
keyword = "#CC9393"
label = "#BCA3A3"
"markup.heading" = "#FFD7A7"
"markup.link.text" = "#CC9393"
"markup.list" = "#DCDCCC"
"markup.quote" = "#757575" 
"markup.raw" = "#FFCFAF" 
namespace = "#C3BF97"
operator = "#CC9393"
special = "#FFCFAF" 
string = "#FFD7A7"
type = "#C3BF97"
"ui.text" = "#DCDCCC"
"ui.text.focus" = "#DCDCCC"
variable = "#DCDCCC"
"variable.other.member" = "#CC9393"
warning = "#FFCFAF" 

# Modifiers for syntax elements
[comment]
fg = "#757575"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#FFD7A7"
modifiers = ["bold"]

["markup.italic"]
fg = "#BCA3A3"
modifiers = ["italic"]

["markup.link.url"]
fg = "#FFFF87"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#DCDCCC"
bg = "#3A3A3A"

["ui.bufferline"]
bg = "#3A3A3A"
fg = "#757575"

["ui.bufferline.active"]
bg = "#3A3A3A"
fg = "#FFD7A7"
modifiers = ["bold"]

["ui.bufferline.modified"]
bg = "#3A3A3A"
fg = "#FFD7A7"

["ui.cursor"]
fg = "#DCDCCC"
modifiers = ["reversed"]

["ui.cursor.insert"]
fg = "#DCDCCC"
modifiers = ["underlined"]

["ui.cursor.match"]
fg = "#FFD7A7"
modifiers = ["underlined"]

["ui.cursor.select"]
fg = "#FFD7A7"
modifiers = ["underlined"]

["ui.cursorline.primary"]
bg = "#333333"
fg = "#DCDCCC"

["ui.gutter"]
bg = "#3A3A3A"

["ui.help"]
bg = "#333333" 
fg = "#F0EFD0" 

["ui.linenr"]
bg = "#3A3A3A"
fg = "#757575" 

["ui.linenr.selected"]
bg = "#333333"
fg = "#F0EFD0" 
modifiers = ["bold"]

["ui.menu"]
bg = "#333333" 
fg = "#F0EFD0"

["ui.menu.scroll"]
bg = "#333333"
fg = "#757575"

["ui.menu.selected"]
bg = "#757575" 
fg = "#DCDCCC"

["ui.popup"]
bg = "#333333"

["ui.selection"]
bg = "#757575" 

["ui.selection.primary"]
bg = "#757575" 

["ui.statusline"]
bg = "#333333" 
fg = "#757575" 

["ui.statusline.inactive"]
bg = "#333333"
fg = "#757575"

["ui.statusline.insert"]
bg = "#FFFF87"
fg = "#3A3A3A"

["ui.statusline.normal"]
bg = "#CC9393"
fg = "#3A3A3A"

["ui.statusline.select"]
bg = "#BCA3A3"
fg = "#3A3A3A"

["ui.virtual.indent-guide"]
