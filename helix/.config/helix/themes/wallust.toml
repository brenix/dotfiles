# Modifiers for syntax elements
[comment]
fg = "#9893A5"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#EA9D34"
modifiers = ["bold"]

["markup.italic"]
fg = "#907AA9"
modifiers = ["italic"]

["markup.link.url"]
fg = "#56949F"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#575279"
