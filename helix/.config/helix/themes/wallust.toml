"constant.character.escape" = "#A292A3"
"constant.numeric" = "#A292A3"
constructor = "#8A9A7B"
debug = "#C5C9C5"
"diff.delta" = "#C4B28A"
"diff.minus" = "#C4746E"
"diff.plus" = "#87A987"
error = "#C4746E"
function = "#87A987"
hint = "#A292A3"
info = "#8BA4B0"
keyword = "#C4746E"
label = "#A292A3"
"markup.heading" = "#C4B28A"
"markup.link.text" = "#C4746E"
"markup.list" = "#C5C9C5"
"markup.quote" = "#A6A69C" 
"markup.raw" = "#E6C384" 
namespace = "#8BA4B0"
