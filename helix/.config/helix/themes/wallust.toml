"variable.other.member" = "#AF3029"
warning = "#D0A215" 

# Modifiers for syntax elements
[comment]
fg = "#1C1B1A"
modifiers = ["italic"]

[diagnostic]
modifiers = ["underlined"]

["diagnostic.error".underline]
style = "curl"

["diagnostic.hint".underline]
style = "curl"

["diagnostic.info".underline]
style = "curl"

["diagnostic.warning".underline]
style = "curl"

# Markup styling
["markup.bold"]
fg = "#AD8301"
modifiers = ["bold"]

["markup.italic"]
fg = "#A02F6F"
modifiers = ["italic"]

["markup.link.url"]
fg = "#879A39"
modifiers = ["underlined"]

["markup.strikethrough"]
modifiers = ["crossed_out"]

# UI elements
["ui.background"]
fg = "#100F0F"
bg = "#FFFCF0"

["ui.bufferline"]
