--allow-insecure-localhost
--disable-breakpad
--disable-device-discovery
--disable-features=TabHoverCardImages,TabHoverCards,HardwareMediaKeyHandling
--disable-logging
--disable-smooth-scrolling
--disable-speech-input
--enable-features=brotli-encoding,LazyFrameLoading,FontCacheScaling,NoStatePrefetch,SpeculativeResourcePrefetching,SpeculativePreconnect,ProactiveTabFreezeAndDiscard,SimplifyHttpsIndicator,EnableTLS13EarlyData,BackForwardCache,DecodeJpeg420ImagesToYUV,DecodeLossyWebPImagesToYUV,DynamicTcmallocTuning,LazyImageLoading,FontAccess,LegacyTLSEnforced,WebRtcHideLocalIpsWithMdns
--enable-gpu-rasterization
--enable-lcd-text
--enable-native-gpu-memory-buffers
--enable-precache
--enable-quic
--enable-stale-while-revalidate
--enable-tcp-fastopen
--enable-zero-copy
--explicitly-allowed-ports=6697
--no-default-browser-check
--origin-to-force-quic-on=accounts.google.com:443
--origin-to-force-quic-on=apis.google.com:443
--origin-to-force-quic-on=notifications.google.com:443
--origin-to-force-quic-on=www.google.com:443
--reduced-referrer-granularity
--use-simple-cache-backend
--wm-window-animations-disabled
