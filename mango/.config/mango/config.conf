# -- Imports & Environment
source=./colors.conf

env=QT_QPA_PLATFORMTHEME,qt6ct
env=QT_AUTO_SCREEN_SCALE_FACTOR,1
env=QT_QPA_PLATFORM,Wayland;xcb
env=XDG_SESSION_TYPE,wayland
env=FREETYPE_PROPERTIES,"truetype:interpreter-version=38 cff:no-stem-darkening=0 autofitter:no-stem-darkening=0 type1:no-stem-darkening=0 t1cid:no-stem-darkening=0"

# -- Appearance & Effects
# Window Blur
blur=0
blur_layer=0
blur_optimized=1
blur_params_num_passes = 2
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

# Cursor
cursor_size=32

# Window Shadows
shadows = 0
layer_shadows = 0
shadow_only_floating = 1
shadows_size = 10
shadows_blur = 15
shadows_position_x = 0
shadows_position_y = 0
shadowscolor= 0x000000ff

# Borders & Opacity
borderpx=1
border_radius=0
no_radius_when_single=0
no_border_when_single=1
focused_opacity=1.0
unfocused_opacity=1.0

# Gaps
gappih=5
gappiv=5
gappoh=0
gappov=0

# -- Animations
# Support types: zoom, slide
animations=0
layer_animations=1
animation_type_open=slide
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1 # 1: horizontal, 0: vertical

# Durations (ms)
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=0

# Curves & Opacity
zoom_initial_ratio=0.4
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# -- Layout Settings
# Scroller Layout
scroller_structs=10
scroller_default_proportion=1
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8,1.0

# Master-Stack Layout
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=0

# Overview & Hotarea
hotarea_size=10
enable_hotarea=1
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Workspace (Tag) Rules
# Available: tile, scroller, grid, deck, monocle, center_tile, vertical_tile
tagrule=id:1,layout_name:right_tile
tagrule=id:2,layout_name:vertical_scroller
tagrule=id:3,layout_name:vertical_grid
tagrule=id:4,layout_name:vertical_grid
tagrule=id:5,layout_name:vertical_grid
tagrule=id:6,layout_name:vertical_grid
tagrule=id:7,layout_name:vertical_grid
tagrule=id:8,layout_name:vertical_grid
tagrule=id:9,layout_name:vertical_grid

# -- Input Devices
# Keyboard
repeat_rate=45
repeat_delay=200
numlockon=0
xkb_rules_layout=us
xkb_rules_options=caps:escape

# Trackpad (Requires relogin)
disable_trackpad=0
tap_to_click=1
tap_and_drag=1
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
left_handed=0
middle_button_emulation=1
swipe_min_threshold=1

# Mouse
mouse_natural_scrolling=1
accel_profile=flat
cursor_size=24

# -- Operational Logic
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=30
drag_tile_to_tile=1
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9

# -- Keybindings

# Essentials
bind=SUPER,space,spawn,rofi -show run
bind=SUPER,Return,spawn,foot
bind=SUPER+SHIFT,Return,spawn,foot -a foot-floating
bind=SUPER,d,spawn,helium-browser
bind=SUPER,s,spawn,foot spotify_player
bind=SUPER,v,spawn,foot wiremix
bind=SUPER,p,spawn,$HOME/.bin/rofi-playlist.sh
bind=SUPER+SHIFT,r,reload_config
bind=SUPER+SHIFT,q,quit

# Screenshot
bind=None,Print,spawn,$HOME/.bin/snip.sh

# Window Management
bind=SUPER,w,killclient,
bind=SUPER,g,toggleglobal,
bind=SUPER+SHIFT,f,togglemaximizescreen,
bind=SUPER,f,togglefloating,
bind=SUPER+SHIFT,space,togglefullscreen,
bind=SUPER,i,minimized,
bind=SUPER+SHIFT,I,restore_minimized
bind=ALT,z,toggle_scratchpad

# Layout & Gaps
bind=SUPER,n,switch_layout
bind=ALT,e,set_proportion,1.0
bind=ALT,x,switch_proportion_preset,
bind=ALT+SHIFT,X,incgaps,1
bind=ALT+SHIFT,Z,incgaps,-1
bind=ALT+SHIFT,R,togglegaps

# Focus Navigation
bind=SUPER,h,focusdir,left
bind=SUPER,j,focusdir,down
bind=SUPER,k,focusdir,up
bind=SUPER,l,focusdir,right
bind=SUPER,Tab,focusstack,next

# Window Movement & Resizing
bind=SUPER+SHIFT,h,exchange_client,left
bind=SUPER+SHIFT,j,exchange_client,down
bind=SUPER+SHIFT,k,exchange_client,up
bind=SUPER+SHIFT,l,exchange_client,right

bind=SUPER+ALT,h,resizewin,-20,0
bind=SUPER+ALT,j,resizewin,0,20
bind=SUPER+ALT,k,resizewin,0,-20
bind=SUPER+ALT,l,resizewin,20,0

# Tag Navigation
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0
bind=SUPER,0,view,10,0

# Move Window to Tag
bind=SUPER+SHIFT,1,tag,1,0
bind=SUPER+SHIFT,2,tag,2,0
bind=SUPER+SHIFT,3,tag,3,0
bind=SUPER+SHIFT,4,tag,4,0
bind=SUPER+SHIFT,5,tag,5,0
bind=SUPER+SHIFT,6,tag,6,0
bind=SUPER+SHIFT,7,tag,7,0
bind=SUPER+SHIFT,8,tag,8,0
bind=SUPER+SHIFT,9,tag,9,0
bind=SUPER+SHIFT,0,tag,10,0

# Switch workspaces left and right
bind=SUPER,bracketleft,viewtoleft,0
bind=SUPER,bracketright,viewtoright,0

# Hardware Keys
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +5%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 5%-
bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=NONE,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
bind=NONE,XF86AudioPause,spawn,playerctl play-pause

# -- Mouse Binds
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize
mousebind=NONE,btn_middle,togglemaximizescreen,0

# -- Window & Layer Rules
layerrule=animation_type_open:zoom,layer_name:rofi
layerrule=animation_type_close:zoom,layer_name:rofi
windowrule=scroller_proportion: 1.0,appid:mpv
windowrule=isfloating:1,appid:foot-floating

# -- Autostart
exec-once=mako
exec-once=waybar
exec-once=kanshi
exec-once=swww-daemon
exec-once=swayidle -w timeout 900 'wlopm --off "*"' resume 'wlopm --on "*"'
exec-once=sh -c 'ps -p 1 -o comm= | grep -q systemd || pipewire'
