env:
  TERM: xterm-256color

scrolling:
  history: 10000
  multiplier: 3

font:
  normal:
    family: Hack Nerd Font Mono
    style: Regular
  bold:
    family: Hack Nerd Font Mono
    style: Regular
  italic:
    family: Hack Nerd Font Mono
    style: Italic
  size: 10
  offset:
    x: 0
    y: -1
  glyph_offset:
    x: 0
    y: 0
  use_thin_strokes: false

draw_bold_text_with_bright_colors: true

colors:
  primary:
    background: "0x161821"
    foreground: "0xC6C8D1"
  cursor:
    text:   "0x161821"
    cursor: "0xC6C8D1"
  normal:
    black:   "0x22262E"
    red:     "0xE27878"
    green:   "0xB4BE82"
    yellow:  "0xE2A478"
    blue:    "0x84A0C6"
    magenta: "0xA093C7"
    cyan:    "0x89B8C2"
    white:   "0xC6C8D1"
  bright:
    black:   "0x6B7089"
    red:     "0xE98989"
    green:   "0xC0CA8E"
    yellow:  "0xE9B189"
    blue:    "0x91ACD1"
    magenta: "0xADA0D3"
    cyan:    "0x95C4CE"
    white:   "0xD2D4DE"

background_opacity: 0.95

mouse_bindings:
  - { mouse: Middle, action: PasteSelection }

mouse:
  double_click: { threshold: 300 }
  triple_click: { threshold: 300 }
  hide_when_typing: false
  url:
    modifiers: None

selection:
  semantic_escape_chars: ',│`|:"'' ()[]{}<>'
  save_to_clipboard: false

window:
  padding:
    x: 0
    y: 0
  dynamic_padding: true

decorations: none

cursor:
  style: Block
  unfocused_hollow: true

live_config_reload: true

working_directory: None

enable_experimental_conpty_backend: false

alt_send_esc: true
