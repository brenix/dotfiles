new-session

##+ KEY BINDINGS {{{

#+ change prefix to backtick
unbind C-b
set-option -g prefix C-x
bind C-x send-prefix

#+ vim style copy paste mode
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer

#+ splitting
unbind %
bind | split-window -h
unbind '"'
bind - split-window -v

#+ window switching
bind-key -n C-left prev
bind-key -n C-right next
bind-key -n S-C-left swap-window -t -1
bind-key -n S-C-right swap-window -t +1

#+ window management
bind n new-window
bind tab next-window
bind t command-prompt "rename-window %%"
bind m choose-window
bind a choose-session

#+ colon :
bind : command-prompt

#+ sync panes
bind v setw synchronize-panes on
bind b setw synchronize-panes off

#+ map vi and arrow keys as pane movement keys
bind -n S-Left select-pane -L
bind -n S-Right select-pane -R
bind -n S-Up select-pane -U
bind -n S-Down select-pane -D
bind h select-pane -L
bind l select-pane -R
bind k select-pane -U
bind j select-pane -D

#+ resize panes using H, J, K, L
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

#+ resize panes using up, down, left, right
bind up resize-pane -U 5
bind down resize-pane -D 5
bind left resize-pane -L 5
bind right resize-pane -R 5

#+ layouts
bind X next-layout
bind Z previous-layout

#+ reload config
bind r source-file ~/.tmux.conf \; display "Reloaded!"

##+ }}}

##+ OPTIONS {{{

#+ set shell
#set -g default-command zsh
#set -g default-shell zsh

#+ term
set -g default-terminal "tmux-256color"

#+ windows/panes: start with 1
set -g base-index 1
set -g pane-base-index 1

#+ history
set -g history-limit 100000

#+ allow terminal scrolling
set-option -g terminal-overrides 'xterm*:smcup@:rmcup@'

#+ resizing
setw -g aggressive-resize on

#+ bell
set-option -g visual-activity on
set-option -g visual-bell off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-option -g bell-action none

##+ }}}

##+ THEME {{{

#+ status bar
set-option -g status-bg black
set-option -g status-fg default
set-option -g status-justify "left"
set-option -g status "on"
set-option -g status-interval 5

#+ panes
set-option -g pane-border-fg brightblack
set-option -g pane-border-bg default
set-option -g pane-active-border-fg white
set-option -g pane-active-border-bg default

#+ messages
set-window-option -g mode-bg white
set-window-option -g mode-fg black
set-option -g message-bg white
set-option -g message-fg black

#+ windows
set-option -g set-titles on
set-option -g set-titles-string '[#S:#I] #W'
set-window-option -g automatic-rename on
set-window-option -g window-status-current-format "#[fg=black,bg=green] #I #[fg=default,bg=black] #W"
set-window-option -g window-status-format "#[fg=black,bg=blue] #I #[fg=white,bg=black] #W"

#+ left side
set-option -g status-left ""

#+ right side
set -g status-right-length 100
set-option -g status-right ""
set-option -g status-right "#[fg=cyan,bg=black]LOAD: #[default]#(cat /proc/loadavg | cut -d ' ' -f1-3) #[fg=cyan,bg=black]TIME: #[default]%r"
