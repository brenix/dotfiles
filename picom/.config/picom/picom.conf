backend = "glx";
glx-no-stencil = true;
glx-copy-from-front = false;

shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -8;
shadow-opacity = 0.7;

fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;
no-fading-openclose = true;

opacity-rule = [
    "84:class_g = 'Alacritty'",
];
detect-client-opacity = true;

wintypes: {
    popup_menu = {
        opacity = 0.94;
    };
    dropdown_menu = {
        opacity = 0.94;
    };
};
