# -- general settings
backend                   = "glx";
glx-copy-from-front       = false;
glx-no-rebind-pixmap      = true;
glx-no-stencil            = true;
mark-ovredir-focused      = true;
mark-wmwin-focused        = true;
unredir-if-possible       = true;
use-damage                = true;
vsync                     = true;
xrender-sync-fence        = true;

# -- fading
fading                    = false;

# -- shadows
shadow-radius             = 12
shadow-opacity            = .75
shadow-offset-x           = -7;
shadow-offset-y           = -7;

# -- opacity
active-opacity            = 1.0;
inactive-opacity          = 0.9;
frame-opacity             = 0.7;
inactive-opacity-override = false;
opacity-rule = [
  "100:class_g   = 'code'",
  "100:class_g   = 'Google-chrome'",
  "100:class_g   = 'firefox'",
  "100:class_g   = 'feh'",
  "100:class_g   = 'mpv'"
];
