# -- general settings
backend = "xrender";

# -- shadow
shadow = true;
shadow-radius = 12
shadow-opacity = .75
shadow-offset-x = -7;
shadow-offset-y = -7;
shadow-exclude = [
	"class_g *?= 'polybar'",
	"class_g = 'Bspwm' && class_i = 'presel_feedback'",
];
dropdown_menu = { shadow = false; };
popup_menu    = { shadow = false; };
utility       = { shadow = false; };

# -- opacity
active-opacity = 0.96;
inactive-opacity = 0.85;
frame-opacity = 1.0;
inactive-opacity-override = false;

# fading
fading = false;
fade-in-step = 0.07;
fade-out-step = 0.07;
