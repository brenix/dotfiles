# -- backend

backend = "glx";
xrender-sync-fence = true;
xrender-sync = true;

# -- glx

glx-no-stencil = true;
glx-copy-from-front = false;

# -- shadows

shadow = true;
shadow-radius = 10;
shadow-offset-x = -10;
shadow-offset-y = -8;
shadow-opacity = 0.7;

# -- opacity

inactive-opacity = 1;
active-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = false;

# -- fading

fading = false;
