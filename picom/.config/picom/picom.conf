# -- general settings
backend = "glx";

# -- shadow
shadow = true;
shadow-radius = 12
shadow-opacity = .75
shadow-offset-x = -7;
shadow-offset-y = -7;
no-dock-shadow = false

# -- blur
blur: {
  method = "dual_kawase";
  strength = 5;
  background = false;
  background-frame = false;
  background-fixed = false;
  kern = "3x3box";
}

# -- rounded corners
corner-radius = 10.0;
detect-rounded-corners = true;
rounded-corners-exclude = [
  "window_type = 'menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'popup_menu'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];
round-borders = 1;
round-borders-exclude = [
  #"class_g = 'TelegramDesktop'",
];

# -- opacity
active-opacity = 0.9;
inactive-opacity = 0.9;
menu-opacity = 1.0;
frame-opacity = 0.7;
inactive-opacity-override = false;

opacity-rule = [
  "100:class_g    = 'Polybar'",
  "100:class_g    = 'code'",
  "100:class_g    = 'Slack'",
  "100:class_g    = 'Google-chrome'",
  "100:class_g    = 'firefox'",
  "100:class_g    = 'Nightly'",
  "100:class_g    = 'feh'",
  "100:class_g    = 'mpv'"
];

# fading
fading = false;
fade-in-step = 0.07;
fade-out-step = 0.07;
