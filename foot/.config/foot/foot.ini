# [colors-dark]
# alpha=0.85

[cursor]
style=underline

[main]
dpi-aware=no
font=GeistMono Nerd Font:pixelsize=16
font-bold=GeistMono Nerd Font:pixelsize=16
line-height=17px
# font=Monego Nerd Font Fix:pixelsize=18:antialias=true
# font-bold=Monego Nerd Font Fix:pixelsize=18:antialias=true
# line-height=18px
# vertical-letter-offset=-1
selection-target=primary

include=~/.config/foot/theme.ini

[mouse]
hide-when-typing=yes

[mouse-bindings]
primary-paste=BTN_RIGHT
select-extend=none

[scrollback]
lines=10000
